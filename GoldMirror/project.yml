# Gold Mirror – Xcode Project Generator
#
# Run this script once from the repo root to create the .xcodeproj
# using XcodeGen (https://github.com/yonaskolb/XcodeGen).
# Install: brew install xcodegen
#
# Usage:
#   cd GoldMirror
#   xcodegen generate

name: GoldMirror
options:
  bundleIdPrefix: com.goldmirror
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  developmentLanguage: ja

settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.goldmirror.app
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.10"
    TARGETED_DEVICE_FAMILY: "1"   # iPhone only
    INFOPLIST_KEY_UIRequiresFullScreen: YES
    INFOPLIST_KEY_UIStatusBarStyle: UIStatusBarStyleLightContent
    INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait

targets:
  GoldMirror:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: GoldMirror
        type: group
    info:
      path: GoldMirror/Info.plist
      properties:
        CFBundleName: "Gold Mirror"
        CFBundleDisplayName: "Gold Mirror"
        UILaunchStoryboardName: ""
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
        NSCameraUsageDescription: "書類のOCR読み取りに使用します"
        NSPhotoLibraryUsageDescription: "書類画像の読み取りに使用します"
    scheme:
      testTargets:
        - GoldMirrorTests
